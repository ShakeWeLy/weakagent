# Global LLM configuration
[llm]
model = "deepseek-v4-flash"
base_url = "https://api.deepseek.com/v1"
api_key = "sk-"
max_tokens = 8192
temperature = 0.0
supports_images = true
use_max_completion_tokens = false
# Thinking mode (DeepSeek/OpenAI-compat): "default" | "enabled" | "disabled"; or true/false
enable_think = "default"


# [llm] #OLLAMA:
# api_type = 'ollama'
# model = "llama3.2"
# base_url = "http://localhost:11434/v1"
# api_key = "ollama"
# max_tokens = 4096
# temperature = 0.0


[scheduler]
# SQLite path for TaskStore. Relative paths are resolved from project root (config.toml directory).
db_path = "weakagent.sqlite3"

[conversation]
# SQLite path for persisted agent conversation tables.
db_path = "weakagent.sqlite3"

[runtime_session]
# SQLite path for runtime session tables (request + last_result history).
db_path = "weakagent.sqlite3"

# Web search (web_search tool). Optional; defaults are sensible for DuckDuckGo-first.
[search]
# Search engine for agent to use. Default is "Google", can be set to "Baidu" or "DuckDuckGo" or "Bing".
engine = "bing"
# Fallback engine order. Default is ["DuckDuckGo", "Baidu", "Bing"] - will try in this order after primary engine fails.
# fallback_engines = ["bing", "google", "baidu"]
fallback_engines = []
# Seconds to wait before retrying all engines again when they all fail due to rate limits. Default is 60.
retry_delay = 15
# Maximum number of times to retry all engines when all fail. Default is 3.
max_retries = 2
# Language code for search results. Options: "en" (English), "zh" (Chinese), etc.
lang = "zh"
# Country code for search results. Options: "us" (United States), "cn" (China), etc.
country = "cn"

# External MCP servers (Streamable HTTP / SSE / stdio)
[mcp]
enabled = false
transport = "streamable_http"
server_url = "http://localhost:3001/mcp"
server_id = "record-app"
sync_key = "YOUR_SYNC_KEY"

# Or multiple servers:
